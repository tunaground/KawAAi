name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm install

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'KawAAi ${{ github.ref_name }}'
          releaseBody: |
            KawAAi ${{ github.ref_name }}

            ## Downloads
            - **macOS (Apple Silicon)**: `.dmg` (aarch64)
            - **macOS (Intel)**: `.dmg` (x86_64)
            - **Windows**: `.msi` / `.exe` (설치파일)
            - **Windows (Portable)**: `.zip` (설치 불필요, WebView2 런타임 필요)
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Create Windows Portable ZIP
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $exePath = "src-tauri/target/release/KawAAi.exe"
          if (Test-Path $exePath) {
            $version = "${{ github.ref_name }}"
            $zipName = "KawAAi_${version}_x64_portable.zip"
            Compress-Archive -Path $exePath -DestinationPath $zipName
            Write-Output "ZIP_PATH=$zipName" >> $env:GITHUB_OUTPUT
            Write-Output "Created portable ZIP: $zipName"
          }
        id: portable

      - name: Upload Portable ZIP to Release
        if: matrix.platform == 'windows-latest' && steps.portable.outputs.ZIP_PATH
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.portable.outputs.ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
