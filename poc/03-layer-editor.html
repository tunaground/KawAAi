            const layer = layers[i];
            const item = document.createElement('div');
            item.className = 'layer-item'
                + (layer.id === activeLayerId ? ' active' : '')
                + (selectedLayerIds.has(layer.id) && layer.id !== activeLayerId ? ' selected' : '');
            item.dataset.layerId = layer.id;
            item.innerHTML = `
                <div class="drag-handle" title="드래그로 순서 변경">⠿</div>
                <div class="layer-color" style="background:${layer.textColor};"><input type="color" value="${layer.textColor}"></div>
                <span class="layer-name">${layer.name}</span>
                <div class="layer-btn ${layer.locked ? 'locked' : ''}" data-action="lock" title="잠금 토글">
                    ${layer.locked ? '🔒' : '🔓'}
                </div>
                <div class="layer-btn ${layer.visible ? '' : 'off'}" data-action="vis" title="가시성 토글">
                    ${layer.visible ? '👁' : '—'}
                </div>
                <div class="layer-btn" data-action="delete" title="삭제" style="color:#888;">🗑</div>
            `;

            // Settings popup (all layer types)
            {
                const popup = document.createElement('div');
                popup.className = 'layer-props-popup';

                const opacityLabel = document.createElement('label');
                opacityLabel.innerHTML = '<span>투명도</span>';
                const slider = document.createElement('input');
                slider.type = 'range';
                slider.min = '0';
                slider.max = '100';
                slider.value = Math.round(layer.opacity * 100);
                slider.addEventListener('input', () => {
                    layer.opacity = parseInt(slider.value) / 100;
                    const box = document.getElementById(`layer-box-${layer.id}`);
                    if (box) box.style.opacity = layer.opacity;
                });
                slider.addEventListener('mousedown', (ev) => ev.stopPropagation());
                opacityLabel.appendChild(slider);
                popup.appendChild(opacityLabel);
                document.body.appendChild(popup);

                const settingsBtn = document.createElement('div');
                settingsBtn.className = 'layer-btn';
                settingsBtn.title = '속성';
                settingsBtn.textContent = '⚙';
                settingsBtn.addEventListener('mousedown', (ev) => {
                    ev.stopPropagation();
                    document.querySelectorAll('.layer-props-popup.visible').forEach(p => p.classList.remove('visible'));
                    const rect = settingsBtn.getBoundingClientRect();
                    popup.style.left = (rect.right + 6) + 'px';
                    popup.style.top = rect.top + 'px';
                    popup.classList.toggle('visible');
                });

                const lockBtn = item.querySelector('[data-action="lock"]');
                lockBtn.parentElement.insertBefore(settingsBtn, lockBtn);

                document.addEventListener('mousedown', (ev) => {
                    if (!popup.contains(ev.target) && ev.target !== settingsBtn) {
                        popup.classList.remove('visible');
                    }
                });
            }

            // Color picker
            const colorInput = item.querySelector('input[type="color"]');
            colorInput.addEventListener('input', (ev) => {
                layer.textColor = ev.target.value;
                ev.target.parentElement.style.background = ev.target.value;
                const box = document.getElementById(`layer-box-${layer.id}`);
                if (box) {
                    const display = box.querySelector('.layer-display');
                    const textarea = box.querySelector('.layer-textarea');
                    if (display) display.style.color = layer.textColor;
                    if (textarea) textarea.style.caretColor = layer.textColor;
                }
            });
            colorInput.addEventListener('mousedown', (ev) => ev.stopPropagation());

            // Hover highlight on canvas
            item.addEventListener('mouseenter', () => {
                const box = document.getElementById(`layer-box-${layer.id}`);
                if (box) box.classList.add('hovered');
            });
            item.addEventListener('mouseleave', () => {
                const box = document.getElementById(`layer-box-${layer.id}`);
                if (box) box.classList.remove('hovered');
            });

            // Click to select — Ctrl+click for multi-select
            item.addEventListener('mousedown', (e) => {
                if (e.target.closest('[data-action]') || e.target.closest('.drag-handle') || e.target.closest('.layer-name-input')) return;
                const modifier = (e.ctrlKey || e.metaKey) ? 'ctrl' : e.shiftKey ? 'shift' : null;
                if (modifier || layer.id !== activeLayerId) {
                    setActiveLayer(layer.id, false, modifier);
                }
            });

            // Double-click name to rename
            item.querySelector('.layer-name').addEventListener('dblclick', (e) => {
                e.stopPropagation();
                const nameEl = e.target.closest('.layer-name');
                if (!nameEl) return;
                const input = document.createElement('input');
                input.className = 'layer-name-input';
                input.value = layer.name;
                input.style.cssText = 'width:100%;background:#333;color:#e0e0e0;border:1px solid #2196f3;border-radius:2px;padding:0 4px;font-size:0.8rem;outline:none;';
                nameEl.replaceWith(input);
                input.focus();
                input.select();

                const commit = () => {
                    const val = input.value.trim();
                    if (val) layer.name = val;
                    renderLayerList();
                };
                input.addEventListener('blur', commit);
                input.addEventListener('keydown', (ev) => {
                    if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
                    if (ev.key === 'Escape') { input.value = layer.name; input.blur(); }
                });
            });
            item.querySelector('[data-action="vis"]').addEventListener('mousedown', (e) => {
                e.stopPropagation();
                toggleLayerVisibility(layer.id);
            });
            item.querySelector('[data-action="lock"]').addEventListener('mousedown', (e) => {
                e.stopPropagation();
                toggleLayerLock(layer.id);
            });
            item.querySelector('[data-action="delete"]').addEventListener('mousedown', (e) => {
                e.stopPropagation();
                removeLayer(layer.id);
            });

            layerListEl.appendChild(item);
        }
    }

    function showInputModal(title, defaultValue = '') {
        return new Promise((resolve) => {
            const overlay = document.getElementById('inputModalOverlay');
            const titleEl = document.getElementById('inputModalTitle');
            const input = document.getElementById('inputModalInput');
            const btns = document.getElementById('inputModalBtns');

            titleEl.textContent = title;
            input.style.display = '';
            input.value = defaultValue;
            btns.innerHTML = '';

            const cancel = document.createElement('button');
            cancel.className = 'btn-cancel';
            cancel.textContent = '취소';
            const ok = document.createElement('button');
            ok.className = 'btn-ok';
            ok.textContent = '확인';

            btns.appendChild(cancel);
            btns.appendChild(ok);
            overlay.classList.add('visible');
            input.focus();
            input.select();

            function close(val) {
                overlay.classList.remove('visible');
                resolve(val);
            }
            cancel.addEventListener('click', () => close(null));
            ok.addEventListener('click', () => close(input.value));
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') close(input.value);
                if (e.key === 'Escape') close(null);
            });
        });
    }

    function showConfirmModal(title, okLabel = '확인', okClass = 'btn-ok') {
        return new Promise((resolve) => {
            const overlay = document.getElementById('inputModalOverlay');
            const titleEl = document.getElementById('inputModalTitle');
            const input = document.getElementById('inputModalInput');
            const btns = document.getElementById('inputModalBtns');

            titleEl.textContent = title;
            input.style.display = 'none';
            btns.innerHTML = '';

            const cancel = document.createElement('button');
            cancel.className = 'btn-cancel';
            cancel.textContent = '취소';
            const ok = document.createElement('button');
            ok.className = okClass;
            ok.textContent = okLabel;

            btns.appendChild(cancel);
            btns.appendChild(ok);
            overlay.classList.add('visible');
            ok.focus();

            function close(val) {
                overlay.classList.remove('visible');
                resolve(val);
            }
            cancel.addEventListener('click', () => close(false));
            ok.addEventListener('click', () => close(true));
            overlay.addEventListener('keydown', function handler(e) {
                if (e.key === 'Enter') { close(true); overlay.removeEventListener('keydown', handler); }
                if (e.key === 'Escape') { close(false); overlay.removeEventListener('keydown', handler); }
            });
        });
    }

    // ===================== LIBRARY (MLT) =====================

    // MLT — 상단 주석 참조
    // 읽기 전용, 앱이 관리하지 않음, 디렉토리 경로만 설정에 기억
    // [SPLIT] 구분, [AA] 태그 이후가 본문

    let mltFiles = [];          // { name: string, handle: FileSystemFileHandle }[]
    let mltParsedEntries = [];  // { name: string, text: string }[]
    let mltSections = [];       // { name: string, startIdx: number, endIdx: number }[]
    let mltCurrentFileIdx = -1;

    function parseMLT(content) {
        const entries = [];
        const blocks = content.split('[SPLIT]');
        for (const block of blocks) {
            const trimmed = block.trim();
            if (!trimmed) continue;

            const aaIdx = trimmed.indexOf('[AA]');
            if (aaIdx === -1) {
                if (trimmed.length > 0) {
                    entries.push({ name: '', text: trimmed });
                }
                continue;
            }

            const name = trimmed.substring(0, aaIdx).trim();
            const text = trimmed.substring(aaIdx + 4).replace(/^\n/, '');
            if (text.trim().length > 0) {
                entries.push({ name, text });
            }
        }
        return entries;
    }

    // Group entries into sections by common name prefix or numbered groups
    function buildSections(entries) {
        if (entries.length <= 20) {
            return [{ name: '전체', startIdx: 0, endIdx: entries.length }];
        }
        // Group every 50 entries
        const sections = [];
        const chunkSize = 50;
        for (let i = 0; i < entries.length; i += chunkSize) {
            const end = Math.min(i + chunkSize, entries.length);
            const firstName = entries[i].name || `#${i + 1}`;
            sections.push({ name: `${i + 1}–${end} (${firstName})`, startIdx: i, endIdx: end });
        }
        return sections;
    }

    async function loadMLTDir() {
        if (!('showDirectoryPicker' in window)) {
            setStatus('이 브라우저에서는 디렉토리 선택을 지원하지 않습니다');
            return;
        }

        try {
            const dirHandle = await window.showDirectoryPicker();
            mltFiles = [];

            for await (const [name, handle] of dirHandle.entries()) {
                if (handle.kind === 'file' && (name.endsWith('.mlt') || name.endsWith('.MLT'))) {
                    mltFiles.push({ name, handle });
                }
            }

            mltFiles.sort((a, b) => a.name.localeCompare(b.name));

            if (mltFiles.length === 0) {
                setStatus('MLT 파일이 없는 디렉토리입니다');
                return;
            }

            // Populate file select
            const fileSel = document.getElementById('mltFileSelect');
            fileSel.innerHTML = '';
            fileSel.disabled = false;
            mltFiles.forEach((f, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = f.name;
                fileSel.appendChild(opt);
            });

            // Auto-expand
            const section = document.getElementById('sectionLibrary');
            if (section.classList.contains('collapsed')) section.classList.remove('collapsed');

            // Load first file
            await loadMLTFile(0);
            setStatus(`MLT 디렉토리: ${mltFiles.length}개 파일`);

        } catch (err) {
            if (err.name !== 'AbortError') {
                console.error(err);
                setStatus('디렉토리 로드 실패');
            }
        }
    }

    async function loadMLTFile(idx) {
        mltCurrentFileIdx = idx;
        const fileData = mltFiles[idx];
        const file = await fileData.handle.getFile();
        const content = await file.text();

        mltParsedEntries = parseMLT(content);
        mltSections = buildSections(mltParsedEntries);

        // Populate section select
        const secSel = document.getElementById('mltSectionSelect');
        secSel.innerHTML = '';
        secSel.disabled = false;
        mltSections.forEach((s, i) => {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = s.name;
            secSel.appendChild(opt);
        });

        renderMLTList(0);
    }

    function onMLTFileSelect() {
        const idx = parseInt(document.getElementById('mltFileSelect').value);
        loadMLTFile(idx);
    }

    function onMLTSectionSelect() {
        const idx = parseInt(document.getElementById('mltSectionSelect').value);
        renderMLTList(idx);
    }

    function renderMLTList(sectionIdx = 0) {
        const list = document.getElementById('libraryList');

        if (mltParsedEntries.length === 0) {
            list.innerHTML = '<div class="empty-hint">항목이 없습니다</div>';
            return;
        }

        const sec = mltSections[sectionIdx] || mltSections[0];
        list.innerHTML = '';

        for (let i = sec.startIdx; i < sec.endIdx; i++) {
            const entry = mltParsedEntries[i];
            const item = document.createElement('div');
            item.className = 'library-item';

            const preview = document.createElement('div');
            preview.className = 'lib-preview';
            preview.textContent = entry.text.split('\n').slice(0, 3).join('\n');
            item.appendChild(preview);

            const name = document.createElement('div');
            name.className = 'lib-name';
            name.textContent = entry.name || `#${i + 1}`;
            item.appendChild(name);

            item.addEventListener('click', () => insertMLTEntry(entry));
            list.appendChild(item);
        }
    }

    function insertMLTEntry(entry) {
        const lines = entry.text.split('\n');
        let maxW = 0;
        lines.forEach(l => { maxW = Math.max(maxW, measureCtx.measureText(l).width); });
        const w = maxW + LAYER_PADDING * 2;
        const h = lines.length * LINE_HEIGHT + LAYER_PADDING * 2;
        const offsetBase = layers.length * 20;

        const layer = createLayer(entry.text, 20 + offsetBase, 20 + offsetBase, w, h);
        layer.name = entry.name || 'MLT';
        const box = document.getElementById(`layer-box-${layer.id}`);
        if (box) {
            box.style.width = layer.w + 'px';
            box.style.height = layer.h + 'px';
        }
        renderLayerList();
        compositeAndPreview();
        setStatus(`"${layer.name}" 레이어로 삽입됨`);
    }

    function renderPaletteSetSelect() {

    function renderPaletteGrid() {
        const grid = document.getElementById('paletteGrid');
        const set = paletteData.sets[paletteData.activeSetIndex];
        const palette = set?.palettes[paletteData.activePaletteIndex];
        grid.innerHTML = '';

        if (!palette || palette.chars.length === 0) {
            grid.innerHTML = '<div class="empty-hint">캐릭터가 없습니다</div>';
            return;
        }

        palette.chars.forEach((ch, i) => {
            const el = document.createElement('div');
            el.className = 'palette-char';
            el.textContent = ch;
            el.title = `U+${ch.codePointAt(0).toString(16).toUpperCase().padStart(4, '0')}`;
            el.addEventListener('click', () => insertPaletteChar(ch));
            el.addEventListener('contextmenu', async (e) => {
                e.preventDefault();
                const ok = await showConfirmModal(`"${ch}" 삭제?`, '삭제', 'btn-danger');
                if (ok) {
                    palette.chars.splice(i, 1);
                    renderPaletteGrid();
                }
            });
            grid.appendChild(el);
        });

    function insertPaletteChar(ch) {
        // Insert into active layer's textarea at cursor
        if (activeLayerId === null) { setStatus('활성 레이어 없음'); return; }
        const box = document.getElementById(`layer-box-${activeLayerId}`);
        if (!box) return;
        const ta = box.querySelector('.layer-textarea');
        if (!ta) return;

        pushUndo();
        const pos = ta.selectionStart;
        const before = ta.value.substring(0, pos);
        const after = ta.value.substring(ta.selectionEnd);
        ta.value = before + ch + after;
        ta.selectionStart = ta.selectionEnd = pos + ch.length;
        const layer = layers.find(l => l.id === activeLayerId);
        if (layer) {
            layer.text = ta.value;
            updateLayerDisplay(layer);
            compositeAndPreview();
        }
        ta.focus();
    }

    async function paletteAction(action) {
        paletteMenuEl.classList.remove('visible');
        const set = paletteData.sets[paletteData.activeSetIndex];
        const palette = set?.palettes[paletteData.activePaletteIndex];

        switch (action) {
            case 'addChar': {
                const ch = await showInputModal('추가할 캐릭터 (1글자)');
                if (ch && [...ch].length >= 1) {
                    palette.chars.push([...ch][0]);
                    renderPaletteGrid();
                }
                break;
            }
            case 'addPalette': {
                const name = await showInputModal('새 팔레트 이름');
                if (name) {
                    set.palettes.push({ name, chars: [] });
                    paletteData.activePaletteIndex = set.palettes.length - 1;
                    renderPaletteSetSelect();
                    renderPaletteGrid();
                }
                break;
            }
            case 'importPalette': {
                // TODO: production에서는 파일 선택 → JSON 파싱 → SQLite 저장
                setStatus('.wap 임포트 (production에서 구현)');
                break;
            }
            case 'exportPalette': {
                // TODO: production에서는 SQLite → JSON → 파일 다운로드
                if (!palette) break;
                const json = JSON.stringify({ name: palette.name, chars: palette.chars }, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${palette.name}.wap`;
                a.click();
                URL.revokeObjectURL(a.href);
                setStatus(`팔레트 "${palette.name}" 익스포트됨`);
                break;
            }
            case 'importSet': {
                // TODO: production에서는 .waps 파일 → 팔레트세트 전체 교체 → SQLite
                setStatus('.waps 임포트 (production에서 구현)');
                break;
            }
            case 'exportSet': {
                const json = JSON.stringify({ name: set.name, palettes: set.palettes }, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${set.name}.waps`;
                a.click();
                URL.revokeObjectURL(a.href);
                setStatus(`팔레트세트 "${set.name}" 익스포트됨`);
                break;
            }
        }
    }

    // ===================== LAYER DRAG REORDER =====================

    let layerDragState = null; // { layerId, startY, itemEl }

    layerListEl.addEventListener('mousedown', (e) => {
        const handle = e.target.closest('.drag-handle');
        if (!handle) return;
        const item = handle.closest('.layer-item');
        if (!item) return;
        e.preventDefault();

        const dragId = parseInt(item.dataset.layerId);
        layerDragState = {
            layerId: dragId,
            startY: e.clientY,
            itemEl: item,
        };
        // Mark all items being moved
        const moveIds = selectedLayerIds.has(dragId) ? selectedLayerIds : new Set([dragId]);
        layerListEl.querySelectorAll('.layer-item').forEach(el => {
            if (moveIds.has(parseInt(el.dataset.layerId))) el.classList.add('dragging-item');
        });
    });

    document.addEventListener('mousemove', (e) => {
        if (!layerDragState) return;

        // Clear all indicators
        layerListEl.querySelectorAll('.drag-over-above, .drag-over-below').forEach(el => {
            el.classList.remove('drag-over-above', 'drag-over-below');
        });

        // Find which item we're hovering over
        const items = [...layerListEl.querySelectorAll('.layer-item')];
        for (const item of items) {
            if (item === layerDragState.itemEl) continue;
            const rect = item.getBoundingClientRect();
            const midY = rect.top + rect.height / 2;
            if (e.clientY >= rect.top && e.clientY <= rect.bottom) {
                if (e.clientY < midY) {
                    item.classList.add('drag-over-above');
                } else {
                    item.classList.add('drag-over-below');
                }
                break;
            }
        }
    });

    document.addEventListener('mouseup', (e) => {
        if (!layerDragState) return;

        layerListEl.querySelectorAll('.dragging-item').forEach(el => el.classList.remove('dragging-item'));

        // Find drop target
        const target = layerListEl.querySelector('.drag-over-above, .drag-over-below');
        if (target) {
            const isAbove = target.classList.contains('drag-over-above');
            const targetId = parseInt(target.dataset.layerId);
            target.classList.remove('drag-over-above', 'drag-over-below');

            // layers array: index 0 = bottom, last = top
            // List is rendered in reverse: top first
            // Move all selected layers (or just the dragged one if not selected)
            const moveIds = selectedLayerIds.has(layerDragState.layerId)
                ? new Set(selectedLayerIds)
                : new Set([layerDragState.layerId]);

            if (!moveIds.has(targetId)) {
                pushUndo();

                // Extract selected layers in their current order
                const moved = layers.filter(l => moveIds.has(l.id));
                layers = layers.filter(l => !moveIds.has(l.id));

                // Find insert position
                let dstIdx = layers.findIndex(l => l.id === targetId);
                if (isAbove) {
                    layers.splice(dstIdx + 1, 0, ...moved);
                } else {
                    layers.splice(dstIdx, 0, ...moved);
                }

                // Update z-index on canvas
                layers.forEach((l, i) => {
                    const el = document.getElementById(`layer-box-${l.id}`);
                    if (el) el.style.zIndex = i + 1;
                });

                renderLayerList();
                compositeAndPreview();
            }
        } else {
            layerListEl.querySelectorAll('.drag-over-above, .drag-over-below').forEach(el => {
                el.classList.remove('drag-over-above', 'drag-over-below');
            });
        }

        layerDragState = null;
    });

    // ===================== COMPOSITING =====================
    //
    // 레이어 합성 알고리즘:
    // 1. 모든 visible 텍스트 레이어를 순회 (이미지 레이어 제외)
    // 2. 각 레이어의 각 문자를 measureText()로 픽셀 x좌표 계산
    // 3. 전체 문자를 x좌표 기준으로 정렬
    // 4. 겹치는 위치에서는 상위 레이어(layerIndex 큰 쪽)가 우선
    // 5. 문자 사이 빈 공간을 fillGap()으로 유니코드 스페이스 조합으로 채움
    //
    // 핵심 원칙:
    //   - 공백 문자 = 투명 (아래 레이어가 비침)
    //   - 비공백 문자 = 불투명 (위 레이어가 아래를 덮음)
    //   - 프로포셔널 폰트이므로 "몇 번째 칸"이 아닌 픽셀 좌표 기반
    //
    // fillGap(targetWidth):
    //   주어진 픽셀 폭을 유니코드 스페이스 조합으로 채움.
    //   greedy 방식: 넓은 스페이스부터 맞춰보고 나머지를 좁은 것으로 채움.
    //   오차는 가장 좁은 스페이스(Hair Space ~1px) 미만.
    //
    // compositeLayersSubset(subset, originX, originY):
    //   병합(merge) 시 선택된 레이어만 합성. origin 보정으로 불필요한 여백 제거.

    // 유니코드 공백 문자인지 판별. 합성 시 "투명"으로 취급.
    function isTransparent(ch) {
        if (!ch) return true;
        const code = ch.codePointAt(0);
        return (
            code === 0x0020 || code === 0x00A0 ||
            code === 0x2000 || code === 0x2001 || code === 0x2002 || code === 0x2003 ||
            code === 0x2004 || code === 0x2005 || code === 0x2006 || code === 0x2007 ||
            code === 0x2008 || code === 0x2009 || code === 0x200A || code === 0x200B ||
            code === 0x3000
        );
    }

    // 문자열의 각 문자별 { char, x좌표, 폭 }을 반환.
    // 합성 시 레이어 내 문자들의 절대 픽셀 위치 계산에 사용.
    function measureString(str) {
        const chars = [...str];
        const result = [];
        let x = 0;
        for (const ch of chars) {
            const w = measureCtx.measureText(ch).width;
            result.push({ char: ch, x, width: w });
            x += w;
        }
        return result;
    }

    // targetWidth 픽셀에 가장 가까운 유니코드 스페이스 조합을 반환.
    // greedy: 넓은 것부터 빼가며 채움. tolerance=0.5px 허용.
    function fillGap(targetWidth) {
        if (targetWidth < 0.1) return { str: '', actualWidth: 0 };
        let remaining = targetWidth;
        let result = '';
        let actualWidth = 0;
        const tolerance = 0.5;

        for (const sp of spaceWidths) {
            while (remaining >= sp.width - tolerance) {
                result += sp.char;
                actualWidth += sp.width;
                remaining -= sp.width;
            }
        }
        return { str: result, actualWidth };
    }

    // 전체 합성: 모든 visible 텍스트 레이어를 합쳐 최종 AA 텍스트 생성.
    // 결과는 프리뷰 패널에 표시되고, 복사/export 시 이 텍스트가 출력됨.
    function compositeLayers() {
        // Compute how many pixel lines we need
        // Each layer contributes lines at its y offset
        const visibleLayers = layers.filter(l => l.visible && l.type === 'text');
        if (visibleLayers.length === 0) return [];

        // Find the pixel range
        let maxPixelLine = 0;
        visibleLayers.forEach(layer => {
            const lineCount = layer.text.split('\n').length;
            const bottomPx = layer.y + 4 + lineCount * LINE_HEIGHT; // 4px padding
            maxPixelLine = Math.max(maxPixelLine, bottomPx);
        });

        const totalLines = Math.ceil(maxPixelLine / LINE_HEIGHT);
        const resultLines = [];

        for (let lineIdx = 0; lineIdx < totalLines; lineIdx++) {
            const lineTopPx = lineIdx * LINE_HEIGHT;
            let placements = [];

            visibleLayers.forEach((layer, layerIdx) => {
                const layerLines = layer.text.split('\n');
                const layerPaddingPx = 4;
                // Which line of this layer falls on lineIdx?
                const layerLineIdx = Math.round((lineTopPx - layer.y - layerPaddingPx) / LINE_HEIGHT);
                if (layerLineIdx < 0 || layerLineIdx >= layerLines.length) return;

                // Check if alignment is close enough
                const expectedPx = layer.y + layerPaddingPx + layerLineIdx * LINE_HEIGHT;
                if (Math.abs(expectedPx - lineTopPx) > LINE_HEIGHT / 2) return;

                const lineText = layerLines[layerLineIdx];
                const measured = measureString(lineText);
                const layerXOffset = layer.x + layerPaddingPx; // 4px padding

                measured.forEach(m => {
                    if (!isTransparent(m.char)) {
                        placements.push({
                            char: m.char,
                            x: m.x + layerXOffset,
                            width: m.width,
                            layerIndex: layerIdx,
                        });
                    }
                });
            });

            if (placements.length === 0) {
                resultLines.push('');
                continue;
            }

            placements.sort((a, b) => a.x - b.x || a.layerIndex - b.layerIndex);

            // Resolve overlaps (higher layerIndex wins)
            const resolved = [];
            for (const p of placements) {
                let dominated = false;
                for (let i = resolved.length - 1; i >= 0; i--) {
                    const r = resolved[i];
                    if (p.x < r.x + r.width && p.x + p.width > r.x) {
                        if (p.layerIndex > r.layerIndex) {
                            resolved.splice(i, 1);
                        } else {
                            dominated = true;
                            break;
                        }
                    }
                }
                if (!dominated) resolved.push(p);
            }

            resolved.sort((a, b) => a.x - b.x);

            // Build output line
            let output = '';
            let currentX = 0;
            for (const p of resolved) {
                const gap = p.x - currentX;
                if (gap > 0.5) {
                    output += fillGap(gap).str;
                }
                output += p.char;
                currentX = p.x + p.width;
            }

            resultLines.push(output);
        }

        // Trim trailing empty lines
        while (resultLines.length > 0 && resultLines[resultLines.length - 1].trim() === '') {
            resultLines.pop();
        }

        return resultLines;
    }

    // 합성 실행 → 프리뷰 갱신.
    // 레이어 편집/이동/추가/삭제 시마다 자동 호출됨.
    // 프리뷰 textarea 크기는 캔버스 safe area에 맞춤 (1:1 대응).
    function compositeAndPreview() {
        const lines = compositeLayers();

        // 합성 결과를 캔버스 높이에 맞춰 빈 줄로 패딩
        const safeW = safeArea.offsetWidth;
        const safeH = safeArea.offsetHeight;
        const totalLines = Math.ceil(safeH / LINE_HEIGHT);
        while (lines.length < totalLines) lines.push('');

        const text = lines.join('\n');
        const ta = document.getElementById('previewTextarea');
        ta.value = text;

        // 프리뷰 textarea 크기 = safe area 크기 + padding/border 보정
        const pad = 12 * 2;
        const border = 2;
        ta.style.width = (safeW + pad + border) + 'px';
        ta.style.height = (safeH + pad + border) + 'px';
    }

    let previewPosition = 'right'; // 'right' | 'bottom'

    function togglePreviewPosition() {
        const main = document.querySelector('.main');
        const preview = document.querySelector('.preview-panel');
        const resize = document.getElementById('rightResize');
        const btn = document.getElementById('previewPosBtn');

        if (previewPosition === 'right') {
            previewPosition = 'bottom';
            // Wrap canvas-area + layer-panel + leftResize in a container
            if (!document.querySelector('.canvas-container')) {
                const container = document.createElement('div');
                container.className = 'canvas-container';
                const children = [...main.children].filter(el =>
                    !el.classList.contains('preview-panel') && el.id !== 'rightResize'
                );
                children.forEach(el => container.appendChild(el));
                main.prepend(container);
            }
            main.classList.add('preview-bottom');
            preview.style.width = '';
            btn.textContent = '▶ 우측';
        } else {
            previewPosition = 'right';
            // Unwrap container
            const container = document.querySelector('.canvas-container');
            if (container) {
                const children = [...container.children];
                children.forEach(el => main.insertBefore(el, container));
                container.remove();
            }
            main.classList.remove('preview-bottom');
            preview.style.height = '';
            preview.style.width = '';
            btn.textContent = '▼ 하단';
        }
    }

            if (qeDotStartPos === -1) {
                qeDotStartPos = curPos;
            } else if (curPos !== qeDotStartPos + qeDotCurrentLen) {
                qeResetDot();
                qeDotStartPos = curPos;
            }
            const before = qeTextarea.value.substring(0, qeDotStartPos);
            const after = qeTextarea.value.substring(qeDotStartPos + qeDotCurrentLen);
            const newDot = getDotString(qeDotIndex);
            qeDotCurrentLen = newDot.length;
            qeTextarea.value = before + newDot + after;
            qeTextarea.selectionStart = qeTextarea.selectionEnd = qeDotStartPos + qeDotCurrentLen;
            qeDotIndex++;
            qeTextarea.dispatchEvent(new Event('input', { bubbles: true }));
        } else if (!e.ctrlKey && !e.metaKey && !e.altKey) {
            qeResetDot();
        }
    });

    qeTextarea.addEventListener('input', () => {
        qeDisplay.textContent = qeTextarea.value;
    });

    // Insert into document
    function qeInsert() {
        const text = qeTextarea.value;
        if (!text.trim()) {
            setStatus('삽입할 텍스트가 없습니다');
            return;
        }
        const w = parseInt(qeCanvas.style.width);
        const h = parseInt(qeCanvas.style.height);
        const offsetBase = layers.length * 30;
        const textColor = document.getElementById('qeTextColor').value;
        const newLayer = createLayer(text, 20 + offsetBase, 20 + offsetBase, w, h, { textColor });
        newLayer.name = 'Quick Edit';
        const box = document.getElementById(`layer-box-${newLayer.id}`);
        if (box) {
            box.style.width = newLayer.w + 'px';
            box.style.height = newLayer.h + 'px';
        }
        renderLayerList();
        compositeAndPreview();
        qeClose();
        setStatus('간이 편집 레이어 삽입됨');
    }

    // Close on Escape
    qeOverlay.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') qeClose();
    });

    // ===================== PANEL RESIZE =====================

    {
        const layerPanel = document.getElementById('leftPanel');
        const previewPanel = document.querySelector('.preview-panel');
        const leftHandle = document.getElementById('leftResize');
        const rightHandle = document.getElementById('rightResize');
        let panelDrag = null;

        leftHandle.addEventListener('mousedown', (e) => {
            e.preventDefault();
            panelDrag = { side: 'left', startX: e.clientX, origW: layerPanel.offsetWidth };
            leftHandle.classList.add('dragging');
        });

        rightHandle.addEventListener('mousedown', (e) => {
            e.preventDefault();
            panelDrag = {
                side: 'right',
                startX: e.clientX,
                startY: e.clientY,
                origW: previewPanel.offsetWidth,
                origH: previewPanel.offsetHeight,
            };
            rightHandle.classList.add('dragging');
        });

        document.addEventListener('mousemove', (e) => {
            if (!panelDrag) return;
            if (panelDrag.side === 'left') {
                const w = Math.max(150, Math.min(500, panelDrag.origW + (e.clientX - panelDrag.startX)));
                layerPanel.style.width = w + 'px';
            } else if (previewPosition === 'bottom') {
                const h = Math.max(100, Math.min(600, panelDrag.origH - (e.clientY - panelDrag.startY)));
                previewPanel.style.height = h + 'px';
            } else {
                const w = Math.max(200, Math.min(600, panelDrag.origW - (e.clientX - panelDrag.startX)));
                previewPanel.style.width = w + 'px';
            }
        });

        document.addEventListener('mouseup', () => {
            if (panelDrag) {
                leftHandle.classList.remove('dragging');
                rightHandle.classList.remove('dragging');
                panelDrag = null;
            }
        });
    }

    // Tab bar focus tracking
    document.getElementById('tabBar').addEventListener('mousedown', () => { tabBarFocused = true; });
    document.addEventListener('mousedown', (e) => {
        if (!e.target.closest('.tab-bar')) tabBarFocused = false;
    });

    // ===================== CANVAS RESIZE =====================

    let canvasResizeDrag = null;

    document.getElementById('canvasResizeHandle').addEventListener('mousedown', (e) => {
        e.preventDefault();
        e.stopPropagation();
        canvasResizeDrag = {
            startX: e.clientX,
            startY: e.clientY,
            origW: canvasEl.offsetWidth,
            origH: canvasEl.offsetHeight,
        };
    });

    function getLayersBound() {
        let maxR = 0, maxB = 0;
        layers.forEach(l => {
            maxR = Math.max(maxR, l.x + l.w);
            maxB = Math.max(maxB, l.y + l.h);
        });
        return { right: maxR, bottom: maxB };
    }

    document.addEventListener('mousemove', (e) => {
        if (!canvasResizeDrag) return;
        const dx = e.clientX - canvasResizeDrag.startX;
        const dy = e.clientY - canvasResizeDrag.startY;
        const bound = getLayersBound();
        const minW = CANVAS_MARGIN * 2 + bound.right;
        const minH = CANVAS_MARGIN * 2 + bound.bottom;
        canvasEl.style.width = Math.max(minW, canvasResizeDrag.origW + dx) + 'px';
        canvasEl.style.height = Math.max(minH, canvasResizeDrag.origH + dy) + 'px';
    });

    document.addEventListener('mouseup', () => {
        if (canvasResizeDrag) {
            canvasResizeDrag = null;
            updateSafeArea();
            drawGrid();
            drawLayerGuides();
            compositeAndPreview();
        }
    });

    // ===================== UTILS =====================

    function setStatus(text) {
        document.getElementById('statusText').textContent = text;
    }

    function updateCursorInfo() {
        if (activeLayerId === null) return;
        const box = document.getElementById(`layer-box-${activeLayerId}`);
        if (!box) return;
        const ta = box.querySelector('.layer-textarea');
        if (!ta || document.activeElement !== ta) return;

        const pos = ta.selectionStart;
        const text = ta.value.substring(0, pos);
        const lineArr = text.split('\n');
        document.getElementById('cursorInfo').textContent = `Ln ${lineArr.length}, Col ${lineArr[lineArr.length - 1].length}`;
    }

    function addLayer() {
        const offsetBase = layers.length * 30;
        createLayer('', 20 + offsetBase, 20 + offsetBase, 250, 120);
        compositeAndPreview();
        setStatus('Layer added');
    }

    function addImageLayer() {
        document.getElementById('imageInput').click();
    }

    document.getElementById('imageInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                const offsetBase = layers.length * 30;
                createLayer('', 20 + offsetBase, 20 + offsetBase, img.naturalWidth, img.naturalHeight, {
                    type: 'image',
                    imageSrc: ev.target.result,
                });
                compositeAndPreview();
                setStatus('이미지 레이어 추가됨');
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
        e.target.value = '';
    });

    // ===================== KEYBOARD =====================

    document.addEventListener('keydown', (e) => {
        // Undo/Redo
        if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
            e.preventDefault();
            if (e.shiftKey) { redo(); } else { undo(); }
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 'y') {
            e.preventDefault();
            redo();
        }

        const inTextarea = document.activeElement?.classList.contains('layer-textarea');
        if ((e.ctrlKey || e.metaKey) && !inTextarea) {
            if (e.key === 'c') {
                e.preventDefault();
                if (tabBarFocused) { copyDocument(); } else { copyLayer(); }
            }
            if (e.key === 'v') {
                e.preventDefault();
                if (tabBarFocused && docClipboard) { pasteDocument(); } else { pasteLayer(); }
            }
        }
    });

    // ===================== INIT =====================

    async function init() {
        try {
            await document.fonts.load(`${FONT_SIZE}px Saitamaar`);
            await new Promise(r => setTimeout(r, 300));
        } catch (e) {}

        initSpaceWidths();
        initPalette();

        // Redraw on canvas resize
        new ResizeObserver(() => { updateSafeArea(); drawGrid(); drawLayerGuides(); }).observe(canvasEl);

        // Create initial document with sample layers
        const doc = createDocument('문서 1');
        project.activeDocId = doc.id;
        restoreDocState();

        createLayer(
            '　 ∧＿∧\n　（　´∀｀）\n　（　　　）\n　｜ ｜　|\n　（＿_）＿）',
            30, 30, 180, 110
        );
        createLayer(
            '／￣￣￣￣￣￣￣￣\n＜　やるおだお！\n＼＿＿＿＿＿＿＿＿',
            200, 20, 220, 76
        );

        saveCurrentDocState();
        renderTabs();
        compositeAndPreview();
        setStatus('Ready');
    }

    init();
</script>
</body>
